name: Scrape Gold Prices

on:
  schedule:
    - cron: '15 5 * * 0-5'  # 11:00 AM NPT (UTC+5:45)
    - cron: '30 5 * * 0-5'  # 11:15 AM NPT (UTC+5:45)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scrapy spider
        working-directory: ./GoldMandu
        env:
          PYTHONHTTPSVERIFY: "0"
        run: scrapy crawl gold_spider
      - name: Commit changes
        run: |
          git config --global user.name '${{ secrets.MAIN_USERNAME }}'
          git config --global user.email '${{ secrets.MAIN_EMAIL }}'
          git add -f Values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update gold prices [skip ci]")
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Notify n8n on Success
        if: success()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "commit_sha": "${{ github.sha }}",
              "run_id": "${{ github.run_id }}",
              "run_attempt": "${{ github.run_attempt }}"
            }'
