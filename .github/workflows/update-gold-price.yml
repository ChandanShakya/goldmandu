name: Scrape Gold Prices

on:
  schedule:
    - cron: '55 4 * * 0-5'  # This schedules the job at 4:55 AM from Sunday (0) to Friday (5)
    - cron: '15 5 * * 0-5'  # This schedules the job at 5:15 AM from Sunday (0) to Friday (5)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scrapy spider
        working-directory: ./GoldMandu
        env:
          PYTHONHTTPSVERIFY: "0"
        run: scrapy crawl gold_spider
      - name: Commit changes
        run: |
          git config --global user.name '${{ secrets.MAIN_USERNAME }}'
          git config --global user.email '${{ secrets.MAIN_EMAIL }}'
          git add -f Values.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update gold prices [skip ci]")
          git push origin HEAD
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
