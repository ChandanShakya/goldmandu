<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldMandu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,700" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/khang-nd/7.css/7.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/Logo.svg">
</head>

<body class="dark-mode">
    <header class="title-bar">
    <div class="title-bar-text">GoldMandu Dashboard</div>
        <a href="calculator.html" class="btn btn-primary">Gold Calculator</a>
        <h1>Gold and Silver Prices</h1>
        <div class="status-bar"><div class="status-bar-field date">Today’s Date</div></div>
        <button role="button" id="dark-mode-btn">
            <img id="dark-mode-icon" src="assets/images/moon.png" alt="Dark mode toggle icon">
        </button>
    </header>

    <main class="container grid columns" data-gap="20px">
        <section class="grid columns" data-gap="16px">
            <div class="card">
                <h2>Fine Gold</h2>
                <div class="tola"></div>
                <div class="gram"></div>
            </div>
            <div class="card">
                <h2>Tejabi Gold</h2>
                <div class="tola"></div>
                <div class="gram"></div>
            </div>
            <div class="card">
                <h2>Silver</h2>
                <div class="tola"></div>
                <div class="gram"></div>
            </div>
        </section>

        <section class="charts-section window" style="max-width: 600px;">
            <h2>Price History Charts</h2>
            <div class="chart-container">
                <div class="title-bar"><div class="title-bar-text">Fine Gold Price History (per tola)</div></div>
                <div class="window-body">
<canvas id="fineGoldChart"></canvas>
</div>
            </div>
            <div class="chart-container">
                <h3>Tejabi Gold Price History (per Tola)</h3>
                <canvas id="tejabiGoldChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Silver Price History (per Tola)</h3>
                <canvas id="silverChart"></canvas>
            </div>
        </section>
    </main>

    <script src="scripts/main.js"></script>
</body>

</html>
